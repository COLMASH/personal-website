server {
    listen 80;
    server_name api.santanaai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Block PHP/ASP/JSP exploit probes
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }

    # Block common exploit paths (WordPress, phpunit, ThinkPHP, Spring, Docker, etc.)
    location ~* /(\.env|\.git|wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|administrator|phpmyadmin|myadmin|vendor/phpunit|eval-stdin|think|thinkphp|actuator|containers/json|\.aws|\.docker|setup\.php|install\.php|admin/config) {
        return 444;
    }

    # Block directory traversal attempts
    location ~* \.\. {
        return 444;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.santanaai.com;

    ssl_certificate /etc/letsencrypt/live/santanaai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/santanaai.com/privkey.pem;

    resolver 127.0.0.11 valid=30s;

    # Block non-standard HTTP methods (WebDAV probes like PROPFIND, etc.)
    if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$) {
        return 444;
    }

    # Block PHP/ASP/JSP exploit probes
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }

    # Block common exploit paths (WordPress, phpunit, ThinkPHP, Spring, Docker, etc.)
    location ~* /(\.env|\.git|wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|administrator|phpmyadmin|myadmin|vendor/phpunit|eval-stdin|think|thinkphp|actuator|containers/json|\.aws|\.docker|setup\.php|install\.php|admin/config) {
        return 444;
    }

    # Block directory traversal attempts
    location ~* \.\. {
        return 444;
    }

    location / {
        # Use explicit container name instead of service "api" to avoid DNS
        # alias collision with chili-chat-backend (which also exposes a service
        # named "api" on the shared personal-website_default network).
        set $upstream http://personal-website-api-1:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ----- chili.santanaai.com (SANTANA AI / Project Chili dossier chat) -----
# Routed to the chili-chat-backend container which lives in the same
# personal-website_default Docker network (joined via external network).
server {
    listen 80;
    server_name chili.santanaai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name chili.santanaai.com;

    ssl_certificate     /etc/letsencrypt/live/chili.santanaai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chili.santanaai.com/privkey.pem;

    resolver 127.0.0.11 valid=30s;

    # Block non-standard HTTP methods
    if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$) {
        return 444;
    }

    # Block exploit probes (mirror the api.santanaai.com vhost)
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }
    location ~* /(\.env|\.git|wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|administrator|phpmyadmin|myadmin|vendor/phpunit|eval-stdin|think|thinkphp|actuator|containers/json|\.aws|\.docker|setup\.php|install\.php|admin/config) {
        return 444;
    }
    location ~* \.\. {
        return 444;
    }

    # SSE streaming requires unbuffered, long-lived connections
    proxy_buffering off;
    proxy_cache off;
    proxy_http_version 1.1;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    chunked_transfer_encoding on;

    location / {
        set $chili_upstream http://chili-chat-backend-api:8000;
        proxy_pass $chili_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
