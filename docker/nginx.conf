server {
    listen 80;
    server_name api.mashconsultancy.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Block PHP/ASP/JSP exploit probes
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }

    # Block common exploit paths (WordPress, phpunit, ThinkPHP, Spring, Docker, etc.)
    location ~* /(\.env|\.git|wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|administrator|phpmyadmin|myadmin|vendor/phpunit|eval-stdin|think|thinkphp|actuator|containers/json|\.aws|\.docker|setup\.php|install\.php|admin/config) {
        return 444;
    }

    # Block directory traversal attempts
    location ~* (\.\./|\.\.\\) {
        return 444;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.mashconsultancy.com;

    ssl_certificate /etc/letsencrypt/live/mashconsultancy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mashconsultancy.com/privkey.pem;

    resolver 127.0.0.11 valid=30s;

    # Block non-standard HTTP methods (WebDAV probes like PROPFIND, etc.)
    if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$) {
        return 444;
    }

    # Block PHP/ASP/JSP exploit probes
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }

    # Block common exploit paths (WordPress, phpunit, ThinkPHP, Spring, Docker, etc.)
    location ~* /(\.env|\.git|wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|administrator|phpmyadmin|myadmin|vendor/phpunit|eval-stdin|think|thinkphp|actuator|containers/json|\.aws|\.docker|setup\.php|install\.php|admin/config) {
        return 444;
    }

    # Block directory traversal attempts
    location ~* (\.\./|\.\.\\) {
        return 444;
    }

    location / {
        set $upstream http://api:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
